; SkillGroups V1
; Character XP is contributed only by skills that are at the top of their fixed group.

[General]
Enabled=true
LogLevel=Info
; 0 = Default, 1 = Custom. Custom enables the CharacterXpMultipliers section.
CharacterXpProfile=0
; 0 = Default, 1 = Custom. Custom enables group and skill character XP scaling.
CharacterXpScalingProfile=0
; 0 = Default, 1 = Custom. Custom uses the CustomCachedSkillXpMultipliers section when applying skill XP.
SkillXpProfile=0
; Re-applies cached skill XP multipliers during every player XP rank-up event.
; Useful if another mod rewrites skill XP multipliers at runtime, but may add overhead.
AutoApplySkillXpOnLevelXp=false
; When true, applying skill XP multipliers divides the final applied useMult by fixed group size.
; This is the only group-based operation applied to skill XP from use.
; It is applied explicitly to game values, not recalculated continuously.
DivideSkillXpByGroupSize=true

; Character XP is character-level progress from skill rank-ups.
; These scale every skill in a group after group gating. Crafting is reduced by default.
[GroupXpMultiplierScales]
Crafting=0.75
Control=1.15
Support=0.75
Defence=1.4
Ranged=1.4
Utility=0.15
Melee=1.4

; SkillGroups-owned character XP contribution multipliers.
; These do not read from or write to ActorValueInfo useMult or improveMult.
[CharacterXpMultipliers]
OneHanded=1.0
TwoHanded=1.0
Archery=1.0
Block=1.0
Smithing=1.0
HeavyArmor=1.0
LightArmor=1.0
Pickpocket=1.0
Lockpicking=1.0
Sneak=1.0
Alchemy=1.0
Speech=1.0
Alteration=1.0
Conjuration=1.0
Destruction=1.0
Illusion=1.0
Restoration=1.0
Enchanting=1.0

; Skill XP is action-to-skill progress from using a skill.
; These values affect ActorValueInfo::Skill::useMult only when applied from MCM/native calls.
[CustomCachedSkillXpMultipliers]
OneHanded=6.3
TwoHanded=5.95
Archery=9.3
Block=8.1
Smithing=1.0
HeavyArmor=3.8
LightArmor=4.0
Pickpocket=8.1
Lockpicking=45.0
Sneak=11.25
Alchemy=0.75
Speech=0.36
Alteration=3.0
Conjuration=2.1
Destruction=1.35
Illusion=4.6
Restoration=2.0
Enchanting=900.0
