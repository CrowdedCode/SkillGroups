; SkillGroups V1
; Character XP is contributed only by skills that are at the top of their fixed group.

[General]
Enabled=true
LogLevel=Info
; Caches character XP contribution multipliers during every player XP rank-up event.
; Useful if another mod changes skill contribution multipliers at runtime, but may add overhead.
AutoCacheOnLevelXp=false
; Re-applies cached skill XP multipliers during every player XP rank-up event.
; Useful if another mod rewrites skill XP multipliers at runtime, but may add overhead.
AutoApplySkillXpOnLevelXp=false
; When true, applying skill XP multipliers divides the final applied useMult by fixed group size.
; This is the only group-based operation applied to skill XP from use.
; It is applied explicitly to game values, not recalculated continuously.
DivideSkillXpByGroupSize=true
; When false, caching reads the live game ActorValueInfo improveMult values.
; When true, the CustomCachedPlayerXpMultipliers section below replaces those values.
UseCustomCachedPlayerXpMultipliers=false
; When true, applying skill XP multipliers uses CustomCachedSkillXpMultipliers instead of cached useMult values.
UseCustomCachedSkillXpMultipliers=false

; Character XP is character-level progress from skill rank-ups.
; These scale every skill in a group after group gating. Crafting is reduced by default.
[GroupXpMultiplierScales]
Crafting=0.75
Command=1.15
Support=0.75
Defence=1.4
Ranged=1.4
Wealth=0.15
Melee=1.4

; Only used when UseCustomCachedPlayerXpMultipliers=true.
; This can intentionally override other mods' level XP multipliers.
; For predictable results, set other multiplier mods to 1.0 when using this section.
[CustomCachedPlayerXpMultipliers]
OneHanded=1.0
TwoHanded=1.0
Archery=1.0
Block=1.0
Smithing=1.0
HeavyArmor=1.0
LightArmor=1.0
Pickpocket=1.0
Lockpicking=1.0
Sneak=1.0
Alchemy=1.0
Speech=1.0
Alteration=1.0
Conjuration=1.0
Destruction=1.0
Illusion=1.0
Restoration=1.0
Enchanting=1.0

; Leave entries blank or commented to use the vanilla ActorValueInfo AVSK improveMult value.
; Setting a value here overrides only character XP contribution, not skill XP gain.
[PlayerXpMultipliers]
;OneHanded=1.0
;TwoHanded=1.0
;Archery=1.0
;Block=1.0
;Smithing=1.0
;HeavyArmor=1.0
;LightArmor=1.0
;Pickpocket=1.0
;Lockpicking=1.0
;Sneak=1.0
;Alchemy=1.0
;Speech=1.0
;Alteration=1.0
;Conjuration=1.0
;Destruction=1.0
;Illusion=1.0
;Restoration=1.0
;Enchanting=1.0

; Skill XP is action-to-skill progress from using a skill.
; These values affect ActorValueInfo::Skill::useMult only when applied from MCM/native calls.
[CustomCachedSkillXpMultipliers]
OneHanded=1.0
TwoHanded=1.0
Archery=1.0
Block=1.0
Smithing=1.0
HeavyArmor=1.0
LightArmor=1.0
Pickpocket=1.0
Lockpicking=1.0
Sneak=1.0
Alchemy=1.0
Speech=1.0
Alteration=1.0
Conjuration=1.0
Destruction=1.0
Illusion=1.0
Restoration=1.0
Enchanting=1.0
